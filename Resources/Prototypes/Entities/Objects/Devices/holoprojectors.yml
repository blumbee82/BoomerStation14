# Boomer edit - holoprojectors no longer use power cells. They have a pool of LimitedCharges:
# placing a hologram spends one, removing/destroying that hologram refunds it. Holograms are persistent (no despawn).
- type: entity
  parent: BaseItem
  id: Holoprojector
  name: holographic sign projector
  description: A handy-dandy holographic projector that displays a janitorial sign.
  components:
  - type: Item
    storedRotation: -90
  - type: HolosignProjector
  - type: UseDelay
  - type: LimitedCharges
    maxCharges: 10
  - type: Sprite
    sprite: Objects/Devices/Holoprojectors/custodial.rsi
    state: icon
  - type: Tag
    tags:
    - HolosignProjector

- type: entity
  parent: Holoprojector
  id: HoloprojectorBorg
  suffix: borg
  name: holosign projector
  description: A modified holographic sign projector for use in custodial cyborgs. Place your signs and pick them back up as needed.
  components:
  - type: HolosignProjector

- type: entity
  parent: Holoprojector
  id: HoloprojectorClownBorg
  name: holopeel projector
  description: A holopeel projector that creates a slippery, hard light banana peel. Lay them down and scoop them back up so the fun never ends!
  suffix: borg
  components:
  - type: HolosignProjector
    signProto: HoloPeel
  - type: Sprite
    sprite: Objects/Devices/Holoprojectors/peel.rsi
    state: icon

- type: entity
  parent: Holoprojector
  id: HolofanProjector
  name: holofan projector
  description: Stop suicidal passengers from killing everyone during atmos emergencies.
  components:
  - type: HolosignProjector
    signProto: HoloFan
  - type: LimitedCharges
    maxCharges: 6
  - type: Sprite
    sprite: Objects/Devices/Holoprojectors/atmos.rsi
    state: icon
  - type: Tag
    tags:
    - HolofanProjector
  - type: StaticPrice
    price: 50
  - type: GuideHelp
    guides:
    - AtmosTools
    - Fires
    - Spacing

- type: entity
  parent: HolofanProjector
  id: HolofanProjectorBorg
  name: integrated holofan
  description: Stops idiots from causing more crew harm during atmospheric emergencies. Installed directly into an engineering cyborg.

- type: entity
  parent: Holoprojector
  id: HoloprojectorField
  name: force field projector
  description: Creates an impassable forcefield that won't let anything through. Close proximity may or may not cause cancer.
  components:
  - type: HolosignProjector
    signProto: HolosignForcefield
  - type: LimitedCharges
    maxCharges: 6
  - type: Sprite
    sprite: Objects/Devices/Holoprojectors/field.rsi
    state: icon
  - type: Tag
    tags:
    - HolofanProjector
  - type: StaticPrice
    price: 130

- type: entity
  parent: Holoprojector
  id: HoloprojectorSecurity
  name: holobarrier projector
  description: Creates a solid but fragile holographic barrier.
  components:
  - type: HolosignProjector
    signProto: HolosignSecurity
  - type: LimitedCharges
    maxCharges: 8
  - type: Sprite
    sprite: Objects/Devices/Holoprojectors/security.rsi
    state: icon
  - type: Tag
    tags:
    - HolofanProjector
    - SecBeltEquip
  - type: StaticPrice
    price: 50
